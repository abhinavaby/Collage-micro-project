<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Smart Cart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        .scanning-active {
            animation: pulse-ring 2s infinite;
        }
        .spinner {
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-32">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-20 p-4 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-600 tracking-tight">SCAN&GO</h1>
            <div id="status-badge" class="text-[10px] font-bold uppercase px-2 py-1 rounded bg-gray-200 text-gray-600">
                Checking NFC...
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <!-- NFC Controller -->
        <div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-100 text-center space-y-4">
            <div id="nfc-icon-container" class="w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center mx-auto transition-all duration-500">
                <svg id="nfc-svg" xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
                </svg>
            </div>
            
            <div class="space-y-1">
                <h2 id="main-instruction" class="text-lg font-bold text-gray-800">Ready to Shop?</h2>
                <p id="sub-instruction" class="text-sm text-gray-500">Click the button below to start the scanner.</p>
            </div>

            <button id="scan-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-heavy py-4 rounded-2xl shadow-lg transition-all transform active:scale-95 flex items-center justify-center gap-3">
                <div id="btn-spinner" class="hidden w-5 h-5 border-2 border-white rounded-full spinner"></div>
                <span id="btn-label">Start Scanning</span>
            </button>

            <div id="error-box" class="hidden text-xs text-red-600 bg-red-50 p-3 rounded-xl border border-red-100"></div>
        </div>

        <!-- Cart Section -->
        <div class="space-y-4">
            <div class="flex justify-between items-center px-1">
                <h3 class="font-bold text-gray-700 uppercase text-xs tracking-widest">Shopping Cart</h3>
                <button onclick="clearCart()" class="text-xs text-gray-400 hover:text-red-500 transition-colors">Clear All</button>
            </div>

            <div id="cart-items" class="space-y-3">
                <!-- Empty State -->
                <div id="empty-cart" class="text-center py-10 bg-gray-100 rounded-3xl border-2 border-dashed border-gray-200">
                    <p class="text-gray-400 text-sm">Cart is empty</p>
                </div>
            </div>
        </div>

        <!-- Demo Mode (Only if hardware missing) -->
        <div id="demo-controls" class="hidden p-4 bg-amber-50 rounded-2xl border border-amber-100 space-y-2">
            <p class="text-[10px] font-bold text-amber-700 uppercase">Demo Controls (No NFC Detected)</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="mockScan('Organic Milk', 4.50, 'milk-001')" class="bg-white border border-amber-200 text-xs py-2 rounded-lg text-amber-800 shadow-sm">+ Milk</button>
                <button onclick="mockScan('Espresso Beans', 12.99, 'coffee-99')" class="bg-white border border-amber-200 text-xs py-2 rounded-lg text-amber-800 shadow-sm">+ Coffee</button>
            </div>
        </div>
    </main>

    <!-- Total Bar -->
    <div class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t p-4 pb-8 z-30">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div>
                <p class="text-gray-400 text-[10px] font-bold uppercase">Estimated Total</p>
                <p id="cart-total" class="text-2xl font-black text-gray-900">$0.00</p>
            </div>
            <button class="bg-black text-white px-8 py-3 rounded-2xl font-bold shadow-xl active:bg-gray-800 transition-colors">
                Checkout
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-full text-sm font-medium shadow-2xl opacity-0 translate-y-4 transition-all duration-300 z-50 pointer-events-none">
        Item added to cart
    </div>

    <script>
        let cart = [];
        let ndef = null;

        const scanBtn = document.getElementById('scan-btn');
        const btnLabel = document.getElementById('btn-label');
        const btnSpinner = document.getElementById('btn-spinner');
        const errorBox = document.getElementById('error-box');
        const statusBadge = document.getElementById('status-badge');
        const nfcIconCont = document.getElementById('nfc-icon-container');
        const cartItems = document.getElementById('cart-items');
        const emptyCart = document.getElementById('empty-cart');
        const cartTotal = document.getElementById('cart-total');
        const toast = document.getElementById('toast');

        // Check compatibility
        if (!('NDEFReader' in window)) {
            statusBadge.textContent = "NFC Unsupported";
            statusBadge.className = "text-[10px] font-bold uppercase px-2 py-1 rounded bg-red-100 text-red-600";
            document.getElementById('demo-controls').classList.remove('hidden');
        } else {
            statusBadge.textContent = "NFC Ready";
            statusBadge.className = "text-[10px] font-bold uppercase px-2 py-1 rounded bg-green-100 text-green-600";
        }

        async function startScanning() {
            if (!('NDEFReader' in window)) {
                showError("Web NFC is not supported on this browser. Use Chrome on Android.");
                return;
            }

            try {
                btnLabel.textContent = "Initializing...";
                btnSpinner.classList.remove('hidden');
                errorBox.classList.add('hidden');

                ndef = new NDEFReader();
                await ndef.scan();
                
                // Success: Scanning is now active
                btnLabel.textContent = "Listening for Tags...";
                btnSpinner.classList.add('hidden');
                scanBtn.classList.add('bg-blue-800', 'scanning-active');
                nfcIconCont.classList.add('bg-blue-100', 'scale-110');
                document.getElementById('main-instruction').textContent = "Hold phone near Tag";
                document.getElementById('sub-instruction').textContent = "The sensor is usually near the top back of the phone.";

                ndef.onreadingerror = () => {
                    showError("Could not read tag. Try holding it closer.");
                };

                ndef.onreading = (event) => {
                    const { message, serialNumber } = event;
                    handleNfcRead(message, serialNumber);
                };

            } catch (error) {
                btnLabel.textContent = "Start Scanning";
                btnSpinner.classList.add('hidden');
                
                if (error.name === "NotAllowedError") {
                    showError("NFC permission denied. Please allow NFC access.");
                } else if (error.name === "NotSupportedError") {
                    showError("NFC is turned off in your phone settings.");
                } else {
                    showError("Error: " + error.message);
                }
            }
        }

        function handleNfcRead(message, id) {
            let item = { name: "NFC Item", price: 5.00, id: id };

            for (const record of message.records) {
                if (record.recordType === "text") {
                    const decoder = new TextDecoder(record.encoding);
                    const text = decoder.decode(record.data);
                    
                    try {
                        // Try parsing JSON if valid
                        const data = JSON.parse(text);
                        item.name = data.name || item.name;
                        item.price = data.price || item.price;
                        item.id = data.id || id;
                    } catch (e) {
                        // Otherwise treat comma separated: Name,Price,ID
                        const parts = text.split(',');
                        if (parts.length >= 2) {
                            item.name = parts[0].trim();
                            item.price = parseFloat(parts[1]) || 5.00;
                            item.id = parts[2] ? parts[2].trim() : id;
                        } else {
                            item.name = text;
                        }
                    }
                }
            }
            addToCart(item);
        }

        function addToCart(product) {
            const existing = cart.find(i => i.id === product.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            showToast(`${product.name} added`);
            renderCart();
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(i => i.id !== id);
                }
                renderCart();
            }
        }

        function renderCart() {
            if (cart.length === 0) {
                emptyCart.classList.remove('hidden');
                cartItems.innerHTML = '';
                cartItems.appendChild(emptyCart);
                cartTotal.textContent = "$0.00";
                return;
            }

            emptyCart.classList.add('hidden');
            cartItems.innerHTML = '';
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                const el = document.createElement('div');
                el.className = "bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between shadow-sm";
                el.innerHTML = `
                    <div>
                        <h4 class="font-bold text-gray-800">${item.name}</h4>
                        <p class="text-xs text-blue-500 font-bold">$${item.price.toFixed(2)}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center bg-gray-50 rounded-xl p-1 border">
                            <button onclick="updateQuantity('${item.id}', -1)" class="w-7 h-7 flex items-center justify-center font-bold">-</button>
                            <span class="w-8 text-center text-sm font-bold">${item.quantity}</span>
                            <button onclick="updateQuantity('${item.id}', 1)" class="w-7 h-7 flex items-center justify-center font-bold">+</button>
                        </div>
                    </div>
                `;
                cartItems.appendChild(el);
            });

            cartTotal.textContent = `$${total.toFixed(2)}`;
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        function showError(msg) {
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('translate-y-0', 'translate-y-4');
            }, 2000);
        }

        function mockScan(name, price, id) {
            addToCart({ name, price, id });
        }

        scanBtn.addEventListener('click', startScanning);
    </script>
</body>
</html>
